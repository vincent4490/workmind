[pytest]
# pytest 配置文件

# Python 路径
pythonpath = .

# 测试搜索路径（指定从 apps 目录开始）
testpaths = apps

# 测试文件匹配模式
python_files = test_*.py

# 测试类匹配模式
python_classes = Test*

# 测试函数匹配模式
python_functions = test_*

# 忽略的目录（不收集测试）
# 注意：tasks 目录中的 test_tasks.py 是 Celery 任务文件，不是测试文件
norecursedirs = 
    .git
    .tox
    dist
    build
    *.egg
    venv
    env
    __pycache__
    node_modules
    migrations
    tasks
    views
    models
    managers
    executors
    utils
    serializers
    api

# 控制台输出选项
console_output_style = progress

# 显示详细的断言信息
addopts = -v --tb=short

# Django 设置
DJANGO_SETTINGS_MODULE = backend.settings
