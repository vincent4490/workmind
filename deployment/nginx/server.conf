# Workmind 裸机部署 Nginx 配置（代码路径：/data/workmind）
# 使用前请将 server_name 改为你的域名或 IP，并复制到 /etc/nginx/conf.d/workmind.conf

server {
    listen 80;
    server_name _;   # 改为你的域名或 IP，如 192.168.1.100 或 workmind.example.com
    client_max_body_size 100M;

    gzip on;
    gzip_static on;
    gzip_proxied any;
    gzip_min_length 1k;
    gzip_buffers 4 16k;
    gzip_comp_level 2;
    gzip_types text/plain application/javascript text/css application/xml text/javascript application/json;
    gzip_vary on;

    # Django 静态资源（collectstatic 输出目录）
    location /django_static/ {
        alias /data/workmind/backend/static_root/;
        expires 3d;
        add_header Cache-Control "public, immutable";
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8009/api/;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_redirect default;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Headers X-Requested-With;
        add_header Access-Control-Allow-Methods GET,POST,OPTIONS;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:8009/admin/;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    # WebSocket
    location /ws/ {
        proxy_pass http://127.0.0.1:8009;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location = / {
        rewrite ^ /workmind/login redirect;
    }

    # 前端静态（Vite 构建产物）
    location / {
        root /data/workmind/frontend/dist;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}
